<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="GG Nagarkar Open Graph card">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052a47"/>
      <stop offset="55%" stop-color="#0b4f7d"/>
      <stop offset="100%" stop-color="#137f8a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#ffffff" stroke-opacity=".08" />
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="26" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="1020" cy="85" rx="210" ry="130" fill="#ffffff" fill-opacity=".16" filter="url(#soft)"/>
  <ellipse cx="160" cy="640" rx="340" ry="170" fill="#a7f3d0" fill-opacity=".18" filter="url(#soft)"/>

  <rect x="74" y="74" width="1052" height="482" rx="28" fill="#ffffff" fill-opacity=".93"/>

  <g transform="translate(116,128)">
    <rect x="0" y="0" width="96" height="96" rx="24" fill="url(#bg)"/>
    <circle cx="31" cy="49" r="17" fill="none" stroke="#ffffff" stroke-width="6"/>
    <path d="M31 49h13v8" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="62" cy="49" r="17" fill="none" stroke="#ccf3ff" stroke-width="6"/>
    <path d="M62 49h13v8" fill="none" stroke="#ccf3ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="74" cy="19" r="5.5" fill="url(#accent)"/>
  </g>

  <text x="236" y="180" fill="#0b2238" font-family="Manrope, Segoe UI, sans-serif" font-size="62" font-weight="800">GG Nagarkar</text>
  <text x="236" y="232" fill="#3e5c76" font-family="Manrope, Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing=".12em">AI • CLOUD • DEVOPS • PRODUCTS</text>

  <text x="116" y="322" fill="#102c45" font-family="Manrope, Segoe UI, sans-serif" font-size="35" font-weight="700">
    Founder building practical AI agents, DevOps automation,
  </text>
  <text x="116" y="367" fill="#102c45" font-family="Manrope, Segoe UI, sans-serif" font-size="35" font-weight="700">
    and enterprise software systems
  </text>

  <g transform="translate(116,433)">
    <rect x="0" y="0" width="232" height="48" rx="24" fill="#e8f3fb"/>
    <text x="24" y="31" fill="#0f4c81" font-family="Manrope, Segoe UI, sans-serif" font-size="20" font-weight="700">Applied AI Consulting</text>
    <rect x="250" y="0" width="136" height="48" rx="24" fill="#e8f3fb"/>
    <text x="279" y="31" fill="#0f4c81" font-family="Manrope, Segoe UI, sans-serif" font-size="20" font-weight="700">OpsRabbit</text>
    <rect x="404" y="0" width="132" height="48" rx="24" fill="#e8f3fb"/>
    <text x="440" y="31" fill="#0f4c81" font-family="Manrope, Segoe UI, sans-serif" font-size="20" font-weight="700">7Targets</text>
  </g>

  <text x="116" y="534" fill="#55738d" font-family="Manrope, Segoe UI, sans-serif" font-size="20" font-weight="600">
    Profile • Projects • Patents • Writing
  </text>
</svg>
