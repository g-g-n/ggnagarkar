  <g fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M318 315h56"/>
    <path d="M365 306l10 9-10 9"/>
    <path d="M820 315h56"/>
    <path d="M867 306l10 9-10 9"/>
