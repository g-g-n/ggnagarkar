<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Shared investigation state for AI operations cost and control</title>
  <desc id="desc">Editorial diagram showing alerts, service knowledge graph, shared investigation state, SRE teams, and centralized LLM cost controls.</desc>
  <rect width="1200" height="630" fill="#0B1220"/>
  <rect x="72" y="78" width="1056" height="474" rx="28" fill="#111C2F" stroke="#26364F" stroke-width="2"/>
  <path d="M147 456C249 350 337 370 438 259C548 137 689 167 790 249C881 323 959 323 1061 226" stroke="#1F8A70" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  <g opacity="0.18">
    <path d="M140 166H1060" stroke="#E5E7EB"/>
    <path d="M140 244H1060" stroke="#E5E7EB"/>
    <path d="M140 322H1060" stroke="#E5E7EB"/>
    <path d="M140 400H1060" stroke="#E5E7EB"/>
    <path d="M140 478H1060" stroke="#E5E7EB"/>
  </g>
  <g>
    <rect x="132" y="154" width="206" height="96" rx="16" fill="#18263C" stroke="#3A4D6B"/>
