    <text x="160" y="370" fill="#9CA3AF" font-family="Inter, Arial, sans-serif" font-size="16">Many responders</text>
  </g>
  <g>
    <rect x="430" y="112" width="340" height="128" rx="20" fill="#12362F" stroke="#1F8A70" stroke-width="2"/>
    <text x="470" y="154" fill="#F9FAFB" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Service Knowledge Graph</text>
    <text x="470" y="190" fill="#B7E4D6" font-family="Inter, Arial, sans-serif" font-size="18">Ownership, dependencies, deploys,</text>
    <text x="470" y="216" fill="#B7E4D6" font-family="Inter, Arial, sans-serif" font-size="18">runbooks, history, infra state</text>
  </g>
