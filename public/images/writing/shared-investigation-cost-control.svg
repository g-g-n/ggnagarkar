    <text x="462" y="388" fill="#FDE68A" font-family="Inter, Arial, sans-serif" font-size="18">One discovery pass, reused by all</text>
    <text x="462" y="416" fill="#FDE68A" font-family="Inter, Arial, sans-serif" font-size="18">responders and follow-up workflows</text>
  </g>
  <g>
    <rect x="862" y="154" width="210" height="96" rx="16" fill="#18263C" stroke="#3A4D6B"/>
