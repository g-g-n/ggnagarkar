<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Shared investigation state for AI operations cost and control</title>
  <desc id="desc">Editorial diagram showing alerts and responders using shared investigation state, reusable service context, and centralized AI cost controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e8f1f8"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4c81"/>
      <stop offset="100%" stop-color="#137f8a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 524c122-40 226-51 314-32 108 23 185 88 315 70 137-19 186-111 329-98 83 8 158 44 242 89v77H0z" fill="#dbeafe" opacity="0.62"/>

  <rect x="70" y="58" width="1060" height="514" rx="28" fill="#ffffff" stroke="#dbe3eb" stroke-width="2" filter="url(#shadow)"/>

  <g transform="translate(116 105)">
    <text x="0" y="0" fill="#0f172a" font-family="Manrope, Segoe UI, sans-serif" font-size="40" font-weight="800">Shared Investigation State</text>
    <text x="0" y="43" fill="#334155" font-family="Manrope, Segoe UI, sans-serif" font-size="25" font-weight="700">The AI Ops cost and control layer</text>
    <text x="0" y="82" fill="#64748b" font-family="Manrope, Segoe UI, sans-serif" font-size="18" font-weight="600">Reuse context once. Govern LLM usage centrally.</text>
  </g>

  <g transform="translate(126 250)">
    <rect x="0" y="0" width="190" height="130" rx="18" fill="#f8fafc" stroke="#dbe3eb" stroke-width="2"/>
    <circle cx="42" cy="42" r="20" fill="#f59e0b"/>
    <path d="M42 30v18" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <circle cx="42" cy="58" r="2.8" fill="#ffffff"/>
    <text x="74" y="40" fill="#0f172a" font-family="Manrope, Segoe UI, sans-serif" font-size="21" font-weight="800">Alert</text>
    <text x="74" y="66" fill="#64748b" font-family="Manrope, Segoe UI, sans-serif" font-size="14" font-weight="650">incident signal</text>
    <rect x="30" y="94" width="126" height="11" rx="5.5" fill="#cbd5e1"/>
  </g>

  <g transform="translate(382 216)">
    <rect x="0" y="0" width="436" height="198" rx="24" fill="url(#core)" filter="url(#shadow)"/>
    <circle cx="78" cy="82" r="42" fill="#ffffff" opacity="0.16"/>
    <path d="M60 84h36M78 66v36" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
    <text x="142" y="76" fill="#ffffff" font-family="Manrope, Segoe UI, sans-serif" font-size="30" font-weight="800">Shared state</text>
    <text x="142" y="111" fill="#dff8f3" font-family="Manrope, Segoe UI, sans-serif" font-size="18" font-weight="700">evidence | owner | deploys</text>
    <text x="142" y="139" fill="#dff8f3" font-family="Manrope, Segoe UI, sans-serif" font-size="18" font-weight="700">runbooks | hypothesis | handoff</text>
    <rect x="142" y="158" width="210" height="18" rx="9" fill="#ffffff" opacity="0.24"/>
  </g>

  <g transform="translate(884 250)">
    <rect x="0" y="0" width="190" height="130" rx="18" fill="#f8fafc" stroke="#dbe3eb" stroke-width="2"/>
    <circle cx="42" cy="42" r="20" fill="#0f4c81"/>
    <path d="M33 44l8 8 16-20" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="74" y="40" fill="#0f172a" font-family="Manrope, Segoe UI, sans-serif" font-size="21" font-weight="800">Control</text>
    <text x="74" y="66" fill="#64748b" font-family="Manrope, Segoe UI, sans-serif" font-size="14" font-weight="650">cost and policy</text>
    <rect x="30" y="94" width="126" height="11" rx="5.5" fill="#cbd5e1"/>
  </g>

  <g transform="translate(258 438)">
