<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Reusable AI operations investigation context loop</title>
  <desc id="desc">A process diagram showing incident discovery being captured once, converted into shared state, reused by responders, and measured through centralized cost and governance controls.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f7fb"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="28" fill="#f8fafc"/>
  <rect x="42" y="40" width="1116" height="440" rx="24" fill="url(#panel)" stroke="#dbe3eb" stroke-width="2"/>

  <g transform="translate(100 86)">
    <text x="0" y="0" fill="#0f172a" font-family="Manrope, Segoe UI, sans-serif" font-size="30" font-weight="800">The reuse loop</text>
    <text x="0" y="36" fill="#64748b" font-family="Manrope, Segoe UI, sans-serif" font-size="17" font-weight="650">Make context durable before another chat repeats discovery.</text>
  </g>

  <g transform="translate(108 198)">
    <rect x="0" y="0" width="210" height="150" rx="18" fill="#ffffff" stroke="#dbe3eb" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="44" cy="45" r="20" fill="#f59e0b"/>
    <path d="M35 45h18M44 36v18" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <text x="74" y="43" fill="#0f172a" font-family="Manrope, Segoe UI, sans-serif" font-size="20" font-weight="800">Discover</text>
    <text x="28" y="90" fill="#475569" font-family="Manrope, Segoe UI, sans-serif" font-size="15" font-weight="650">signals and facts</text>
    <text x="28" y="115" fill="#475569" font-family="Manrope, Segoe UI, sans-serif" font-size="15" font-weight="650">from ops systems</text>
  </g>

  <g transform="translate(370 198)">
    <rect x="0" y="0" width="210" height="150" rx="18" fill="#ffffff" stroke="#dbe3eb" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="44" cy="45" r="20" fill="#137f8a"/>
    <path d="M34 48l8 8 17-23" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="74" y="43" fill="#0f172a" font-family="Manrope, Segoe UI, sans-serif" font-size="20" font-weight="800">Record</text>
    <text x="28" y="90" fill="#475569" font-family="Manrope, Segoe UI, sans-serif" font-size="15" font-weight="650">evidence trail</text>
    <text x="28" y="115" fill="#475569" font-family="Manrope, Segoe UI, sans-serif" font-size="15" font-weight="650">and hypothesis</text>
  </g>

  <g transform="translate(632 198)">
    <rect x="0" y="0" width="210" height="150" rx="18" fill="#ffffff" stroke="#dbe3eb" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="44" cy="45" r="20" fill="#0f4c81"/>
    <path d="M34 42h20M46 34l10 8-10 8" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="74" y="43" fill="#0f172a" font-family="Manrope, Segoe UI, sans-serif" font-size="20" font-weight="800">Reuse</text>
    <text x="28" y="90" fill="#475569" font-family="Manrope, Segoe UI, sans-serif" font-size="15" font-weight="650">handoffs and</text>
    <text x="28" y="115" fill="#475569" font-family="Manrope, Segoe UI, sans-serif" font-size="15" font-weight="650">summaries</text>
  </g>

  <g transform="translate(894 198)">
    <rect x="0" y="0" width="210" height="150" rx="18" fill="#ffffff" stroke="#dbe3eb" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="44" cy="45" r="20" fill="#7abf7a"/>
    <path d="M33 53h23M33 44h23M33 35h23" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <text x="74" y="43" fill="#0f172a" font-family="Manrope, Segoe UI, sans-serif" font-size="20" font-weight="800">Measure</text>
    <text x="28" y="90" fill="#475569" font-family="Manrope, Segoe UI, sans-serif" font-size="15" font-weight="650">tokens, cost,</text>
    <text x="28" y="115" fill="#475569" font-family="Manrope, Segoe UI, sans-serif" font-size="15" font-weight="650">policy and audit</text>
  </g>

  <g fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M320 273h42"/>
    <path d="M354 264l10 9-10 9"/>
    <path d="M582 273h42"/>
    <path d="M616 264l10 9-10 9"/>
    <path d="M844 273h42"/>
    <path d="M878 264l10 9-10 9"/>
  </g>

  <g transform="translate(210 388)">
    <rect x="0" y="0" width="780" height="48" rx="24" fill="#e8f1f8" stroke="#c7dceb"/>
    <text x="32" y="31" fill="#0f4c81" font-family="Manrope, Segoe UI, sans-serif" font-size="16" font-weight="800">Durable context turns repeated chat work into an operations control surface.</text>
  </g>
</svg>
